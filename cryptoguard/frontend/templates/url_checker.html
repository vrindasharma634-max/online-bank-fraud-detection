<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CryptoGuard – URL Fraud Checker</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0c10;
      --surface:   #13151c;
      --border:    #21242f;
      --accent:    #00e5ff;
      --safe:      #00e676;
      --warn:      #ffca28;
      --danger:    #ff5252;
      --txt:       #e8eaf6;
      --muted:     #6c7a99;
      --radius:    12px;
      --mono:      'IBM Plex Mono', monospace;
      --display:   'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--txt);
      font-family: var(--display);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1rem 4rem;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 0.5rem;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo-text {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--txt);
    }
    h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }
    h1 span { color: var(--accent); }
    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      font-family: var(--mono);
    }

    /* ── Card ────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem;
      width: 100%;
      max-width: 680px;
      margin-bottom: 1.25rem;
    }

    /* ── Input row ───────────────────────────────────────────────── */
    .input-wrap {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }
    .url-input {
      flex: 1;
      background: #0b0c10;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 14px;
      font-family: var(--mono);
      font-size: 0.88rem;
      color: var(--txt);
      height: 46px;
      outline: none;
      transition: border-color .2s;
    }
    .url-input:focus { border-color: var(--accent); }
    .url-input::placeholder { color: var(--muted); }

    .scan-btn {
      background: var(--accent);
      color: #0b0c10;
      border: none;
      border-radius: 8px;
      padding: 0 22px;
      font-family: var(--display);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      height: 46px;
      white-space: nowrap;
      transition: opacity .2s, transform .1s;
      display: flex; align-items: center; gap: 7px;
    }
    .scan-btn:hover { opacity: .88; }
    .scan-btn:active { transform: scale(.97); }
    .scan-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Loading ─────────────────────────────────────────────────── */
    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid #0b0c10;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Result area ─────────────────────────────────────────────── */
    #result-area { display: none; }

    .verdict-bar {
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .verdict-bar.safe    { background: rgba(0,230,118,.08); border: 1px solid rgba(0,230,118,.25); }
    .verdict-bar.suspicious { background: rgba(255,202,40,.07); border: 1px solid rgba(255,202,40,.25); }
    .verdict-bar.fraud   { background: rgba(255,82,82,.08);  border: 1px solid rgba(255,82,82,.25); }

    .verdict-left { display: flex; align-items: center; gap: 12px; }
    .verdict-icon {
      width: 44px; height: 44px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .safe    .verdict-icon { background: rgba(0,230,118,.15); }
    .suspicious .verdict-icon { background: rgba(255,202,40,.15); }
    .fraud   .verdict-icon { background: rgba(255,82,82,.15); }

    .verdict-label {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .safe    .verdict-label { color: var(--safe); }
    .suspicious .verdict-label { color: var(--warn); }
    .fraud   .verdict-label { color: var(--danger); }

    .verdict-url {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--muted);
      word-break: break-all;
      margin-top: 2px;
    }

    .score-ring {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
    }
    .score-num {
      font-size: 2rem;
      font-weight: 700;
      font-family: var(--mono);
      line-height: 1;
    }
    .safe .score-num    { color: var(--safe); }
    .suspicious .score-num { color: var(--warn); }
    .fraud .score-num   { color: var(--danger); }
    .score-label {
      font-size: 0.7rem;
      color: var(--muted);
      font-family: var(--mono);
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    /* ── Gauge bar ───────────────────────────────────────────────── */
    .gauge-wrap {
      background: var(--border);
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
      margin-bottom: 1rem;
    }
    .gauge-fill {
      height: 100%;
      border-radius: 4px;
      transition: width .7s ease;
    }
    .safe-fill       { background: var(--safe); }
    .suspicious-fill { background: var(--warn); }
    .fraud-fill      { background: var(--danger); }

    /* ── Flags list ──────────────────────────────────────────────── */
    .section-title {
      font-size: 0.72rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: var(--mono);
      margin-bottom: 0.6rem;
    }
    .flags-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .flag-item {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      font-size: 0.88rem;
      color: #c8d0e8;
      font-family: var(--mono);
      line-height: 1.4;
    }
    .flag-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 5px;
    }
    .dot-ok      { background: var(--safe); }
    .dot-warn    { background: var(--warn); }
    .dot-danger  { background: var(--danger); }

    /* ── Details grid ────────────────────────────────────────────── */
    .details-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .detail-cell {
      background: #0b0c10;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
    }
    .detail-key {
      font-size: 0.68rem;
      color: var(--muted);
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: 3px;
    }
    .detail-val {
      font-size: 0.82rem;
      color: var(--txt);
      font-family: var(--mono);
      word-break: break-all;
    }

    /* ── Error ────────────────────────────────────────────────────── */
    .error-box {
      background: rgba(255,82,82,.08);
      border: 1px solid rgba(255,82,82,.3);
      border-radius: 8px;
      padding: 12px 16px;
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--danger);
      display: none;
    }

    /* ── Footer note ─────────────────────────────────────────────── */
    .footnote {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
      margin-top: .5rem;
      line-height: 1.6;
    }

    /* ── History ─────────────────────────────────────────────────── */
    .history-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: .8rem;
    }
    .clear-btn {
      background: none; border: 1px solid var(--border);
      border-radius: 6px; padding: 4px 10px;
      font-family: var(--mono); font-size: 0.72rem;
      color: var(--muted); cursor: pointer;
      transition: border-color .2s;
    }
    .clear-btn:hover { border-color: var(--muted); }

    .history-list { display: flex; flex-direction: column; gap: 6px; }
    .history-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px;
      background: #0b0c10;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: border-color .2s;
    }
    .history-item:hover { border-color: var(--accent); }
    .h-badge {
      font-size: 0.68rem;
      font-family: var(--mono);
      border-radius: 4px;
      padding: 2px 7px;
      font-weight: 500;
      flex-shrink: 0;
    }
    .h-safe    { background: rgba(0,230,118,.12); color: var(--safe); }
    .h-suspicious { background: rgba(255,202,40,.1); color: var(--warn); }
    .h-fraud   { background: rgba(255,82,82,.1);  color: var(--danger); }
    .h-url {
      font-family: var(--mono); font-size: 0.78rem;
      color: var(--muted); overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; flex: 1;
    }
    .h-score { font-family: var(--mono); font-size: 0.78rem; color: var(--muted); flex-shrink: 0; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🛡</div>
    <span class="logo-text">CryptoGuard</span>
  </div>
  <h1>URL <span>Fraud</span> Checker</h1>
  <p class="subtitle">Paste any link — we'll tell you if it's safe</p>
</header>

<!-- Input card -->
<div class="card">
  <div class="input-wrap">
    <input
      class="url-input"
      id="urlInput"
      type="text"
      placeholder="https://example-crypto-wallet.com/verify"
      autocomplete="off"
      spellcheck="false"
    />
    <button class="scan-btn" id="scanBtn" onclick="scanURL()">
      <div class="spinner" id="spinner"></div>
      <span id="btnText">Scan URL</span>
    </button>
  </div>

  <div class="error-box" id="errorBox"></div>
</div>

<!-- Result card -->
<div class="card" id="result-area">

  <!-- verdict bar -->
  <div class="verdict-bar" id="verdictBar">
    <div class="verdict-left">
      <div class="verdict-icon" id="verdictIcon"></div>
      <div>
        <div class="verdict-label" id="verdictLabel"></div>
        <div class="verdict-url" id="verdictUrl"></div>
      </div>
    </div>
    <div class="score-ring">
      <div class="score-num" id="scoreNum"></div>
      <div class="score-label">risk score</div>
    </div>
  </div>

  <!-- gauge -->
  <div class="gauge-wrap">
    <div class="gauge-fill" id="gaugeFill" style="width:0%"></div>
  </div>

  <!-- flags -->
  <p class="section-title">Detection signals</p>
  <ul class="flags-list" id="flagsList"></ul>

  <div style="margin-top:1.2rem">
    <p class="section-title">URL breakdown</p>
    <div class="details-grid" id="detailsGrid"></div>
  </div>

</div>

<!-- History card -->
<div class="card" id="historyCard" style="display:none">
  <div class="history-header">
    <p class="section-title" style="margin:0">Recent scans</p>
    <button class="clear-btn" onclick="clearHistory()">Clear</button>
  </div>
  <div class="history-list" id="historyList"></div>
</div>

<p class="footnote">
  Analysis is heuristic-based and runs entirely in-browser.<br>
  For critical decisions verify with a dedicated threat-intelligence service.
</p>

<script>
  const STORAGE_KEY = 'cg_url_history';

  // ── Heuristic analysis (mirrors the Flask backend logic) ─────────────────
  const SUSPICIOUS_KW = [
    'login','signin','verify','account','update','secure','banking',
    'wallet','crypto','bitcoin','ethereum','binance','metamask',
    'confirm','password','paypal','support','helpdesk','recovery',
    'airdrop','claim','free','bonus','prize','winner','urgent',
  ];
  const TRUSTED_DOMAINS = [
    'coinbase.com','binance.com','kraken.com','gemini.com',
    'crypto.com','uniswap.org','opensea.io','etherscan.io',
    'blockchain.com','metamask.io','ledger.com','trezor.io',
  ];
  const BAD_TLDS = ['.tk','.ml','.ga','.cf','.gq','.xyz','.top','.click','.link'];
  const SHORTENERS = ['bit.ly','tinyurl.com','t.co','goo.gl','ow.ly','buff.ly','rebrand.ly'];

  function analyseURL(raw) {
    let url = raw.trim();
    if (!/^https?:\/\//i.test(url)) url = 'http://' + url;

    let parsed;
    try { parsed = new URL(url); }
    catch(e) {
      return { score:100, verdict:'fraud', flags:['Could not parse URL'], details:{} };
    }

    const hostname = parsed.hostname.toLowerCase();
    const full     = url.toLowerCase();
    const path     = parsed.pathname.toLowerCase();
    let score = 0;
    const flags = [];

    if (parsed.protocol === 'http:') { flags.push('No HTTPS – connection is unencrypted'); score += 15; }

    if (/^\d{1,3}(\.\d{1,3}){3}$/.test(hostname)) {
      flags.push('IP address used instead of a domain name'); score += 30;
    }

    for (const tld of BAD_TLDS) {
      if (hostname.endsWith(tld)) { flags.push('High-risk free TLD detected: ' + tld); score += 25; break; }
    }

    for (const trusted of TRUSTED_DOMAINS) {
      const base = trusted.split('.')[0];
      if (hostname.includes(base) && hostname !== trusted && !hostname.endsWith('.' + trusted)) {
        flags.push('Possible typosquatting of trusted site: ' + trusted); score += 35; break;
      }
    }

    const parts = hostname.split('.');
    if (parts.length > 4) { flags.push('Unusual number of subdomains (' + (parts.length - 2) + ')'); score += 20; }

    const hits = SUSPICIOUS_KW.filter(k => full.includes(k));
    if (hits.length) { flags.push('Phishing keywords in URL: ' + hits.slice(0,5).join(', ')); score += Math.min(hits.length * 8, 30); }

    if (url.length > 100) { flags.push('Unusually long URL (' + url.length + ' chars)'); score += 10; }

    if (SHORTENERS.some(s => hostname.includes(s))) {
      flags.push('URL shortener detected – real destination is hidden'); score += 20;
    }

    if (/%[0-9a-fA-F]{2}/.test(url)) { flags.push('URL contains encoded characters (possible obfuscation)'); score += 10; }

    if (path.includes('//') || full.includes('redirect') || full.includes('url=')) {
      flags.push('Redirect pattern detected in URL path'); score += 15;
    }

    score = Math.min(score, 100);
    const verdict = score < 30 ? 'safe' : score < 60 ? 'suspicious' : 'fraud';

    return {
      score, verdict,
      flags: flags.length ? flags : ['No suspicious signals detected'],
      details: {
        protocol:   parsed.protocol.replace(':', ''),
        hostname,
        path:       parsed.pathname || '/',
        query:      parsed.search || '—',
        url_length: url.length,
      },
    };
  }

  // ── UI helpers ────────────────────────────────────────────────────────────
  const ICONS   = { safe:'✓', suspicious:'⚠', fraud:'✕' };
  const LABELS  = { safe:'Safe', suspicious:'Suspicious', fraud:'Fraudulent' };

  function showResult(url, res) {
    const v = res.verdict;
    const bar = document.getElementById('verdictBar');
    bar.className = 'verdict-bar ' + v;

    document.getElementById('verdictIcon').textContent  = ICONS[v];
    document.getElementById('verdictLabel').textContent = LABELS[v];
    document.getElementById('verdictUrl').textContent   = url.length > 60 ? url.slice(0,57)+'…' : url;
    document.getElementById('scoreNum').textContent     = res.score;

    const fill = document.getElementById('gaugeFill');
    fill.className = 'gauge-fill ' + v + '-fill';
    setTimeout(() => fill.style.width = res.score + '%', 30);

    const ul = document.getElementById('flagsList');
    ul.innerHTML = res.flags.map(f => {
      const dot = v === 'fraud' ? 'dot-danger' : v === 'suspicious' ? 'dot-warn' : 'dot-ok';
      return `<li class="flag-item"><span class="flag-dot ${dot}"></span>${f}</li>`;
    }).join('');

    const grid = document.getElementById('detailsGrid');
    const d = res.details;
    grid.innerHTML = [
      ['Protocol', d.protocol], ['Hostname', d.hostname],
      ['Path', d.path || '/'], ['Query string', d.query || '—'],
      ['URL length', d.url_length + ' chars'], ['Verdict', LABELS[v]],
    ].map(([k,val]) => `
      <div class="detail-cell">
        <div class="detail-key">${k}</div>
        <div class="detail-val">${val}</div>
      </div>`).join('');

    document.getElementById('result-area').style.display = 'block';
  }

  function setLoading(on) {
    document.getElementById('spinner').style.display = on ? 'block' : 'none';
    document.getElementById('btnText').textContent   = on ? 'Scanning…' : 'Scan URL';
    document.getElementById('scanBtn').disabled      = on;
  }

  function showError(msg) {
    const b = document.getElementById('errorBox');
    b.textContent = msg;
    b.style.display = 'block';
    setTimeout(() => b.style.display = 'none', 5000);
  }

  // ── History ───────────────────────────────────────────────────────────────
  function loadHistory() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch(e) { return []; }
  }
  function saveHistory(h) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(h.slice(0, 15))); } catch(e) {}
  }
  function pushHistory(url, res) {
    const h = loadHistory().filter(x => x.url !== url);
    h.unshift({ url, verdict: res.verdict, score: res.score });
    saveHistory(h);
    renderHistory();
  }
  function clearHistory() {
    localStorage.removeItem(STORAGE_KEY);
    renderHistory();
  }
  function renderHistory() {
    const h = loadHistory();
    const card = document.getElementById('historyCard');
    if (!h.length) { card.style.display = 'none'; return; }
    card.style.display = 'block';
    document.getElementById('historyList').innerHTML = h.map((item,i) => `
      <div class="history-item" onclick="rerunFromHistory(${i})">
        <span class="h-badge h-${item.verdict}">${LABELS[item.verdict]}</span>
        <span class="h-url">${item.url}</span>
        <span class="h-score">${item.score}/100</span>
      </div>`).join('');
  }
  function rerunFromHistory(i) {
    const item = loadHistory()[i];
    if (!item) return;
    document.getElementById('urlInput').value = item.url;
    scanURL();
  }

  // ── Main scan ─────────────────────────────────────────────────────────────
  function scanURL() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) { showError('Please enter a URL to scan.'); return; }

    document.getElementById('errorBox').style.display = 'none';
    setLoading(true);

    // Simulate small async delay for UX
    setTimeout(() => {
      try {
        const result = analyseURL(url);
        showResult(url, result);
        pushHistory(url, result);
      } catch(e) {
        showError('Analysis failed: ' + e.message);
      }
      setLoading(false);
    }, 600);
  }

  // Enter key support
  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') scanURL();
  });

  // Init
  renderHistory();
</script>
</body>
</html>
